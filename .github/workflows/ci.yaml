name: Terraform Plan, Validate & Linting

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: infra/environments/prod

jobs:
  terraform-plan:
    name: Terraform Lint, Validate and Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tflint --init
          tflint --recursive

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform
          soft_fail: true

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_environment: prod
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_domain_name: gus-threat-modelling-tool.com
          TF_VAR_subdomain: tm
          TF_VAR_image_tag: latest
        run: terraform plan

      - name: Job summary
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Format: DONE" >> $GITHUB_STEP_SUMMARY
          echo "- Validate: DONE" >> $GITHUB_STEP_SUMMARY
          echo "- tflint: DONE" >> $GITHUB_STEP_SUMMARY
          echo "- Checkov: DONE" >> $GITHUB_STEP_SUMMARY
          echo "- Plan: DONE" >> $GITHUB_STEP_SUMMARY